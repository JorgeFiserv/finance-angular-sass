<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    @if (!collapsed) {
      <img src="assets/images/logo.png" alt="Personal Finance App" class="sidebar-logo" />
    }
    <button class="collapse-button" (click)="toggleSidebar()" aria-label="Toggle sidebar">
      <span class="material-icons">
        {{ collapsed ? 'chevron_right' : 'chevron_left' }}
      </span>
    </button>
  </div>

  <nav class="sidebar-menu">
    @for (item of menuItems; track item.route) {
      <button class="sidebar-item" [class.active]="isActive(item.route)" (click)="goTo(item.route)">
        <span class="material-icons icon">{{ item.icon }}</span>
        @if (!collapsed) {
          <span class="label">{{ item.label }}</span>
        }
      </button>
    }

    <button class="sidebar-item sidebar-item--logout" (click)="logout()">
      <span class="material-icons icon">logout</span>
      @if (!collapsed) {
        <span class="label">Sair</span>
      }
    </button>
  </nav>
</aside>

<app-confirm-modal
  [isOpen]="isLogoutModalOpen()"
  title="Deseja realmente sair?"
  message="Ao sair, você será redirecionado para a tela de login."
  confirmLabel="Sair"
  cancelLabel="Cancelar"
  (onCancel)="cancelLogout()"
  (onConfirm)="confirmLogout()"
/>
